<svg width="1200" height="820" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#0f172a; stroke:#38bdf8; stroke-width:2; rx:12; }
    .text { fill:white; font-family:Arial; font-size:14px; }
    .title { fill:#38bdf8; font-family:Arial; font-size:20px; font-weight:bold; }
    .arrow { stroke:#94a3b8; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="420" y="40" class="title">
    Sentinel Banking — Multi-Agent AI Architecture
  </text>

  <!-- Main Entry -->
  <rect x="450" y="70" width="300" height="60" class="box"/>
  <text x="505" y="105" class="text">main.py</text>

  <rect x="450" y="160" width="300" height="70" class="box"/>
  <text x="520" y="200" class="text">Orchestrator</text>

  <rect x="450" y="260" width="300" height="70" class="box"/>
  <text x="515" y="300" class="text">System Graph Router</text>

  <!-- Agents -->
  <rect x="120" y="380" width="300" height="90" class="box"/>
  <text x="170" y="415" class="text">Dispatcher Agent</text>
  <text x="160" y="440" class="text">Complaint Routing</text>

  <rect x="450" y="380" width="300" height="110" class="box"/>
  <text x="515" y="415" class="text">Sentinel Agent</text>
  <text x="470" y="440" class="text">Fraud Risk Scoring</text>
  <text x="470" y="460" class="text">ML Probability + Policy</text>
  <text x="470" y="480" class="text">Channel Risk Check</text>

  <rect x="780" y="380" width="300" height="100" class="box"/>
  <text x="840" y="415" class="text">Trajectory Agent</text>
  <text x="810" y="440" class="text">Product Recommendation</text>
  <text x="810" y="460" class="text">DSR Validation</text>

  <!-- RAG -->
  <rect x="450" y="530" width="300" height="80" class="box"/>
  <text x="525" y="565" class="text">RAG Policy Engine</text>
  <text x="490" y="585" class="text">ChromaDB + Embeddings</text>

  <!-- LLM -->
  <rect x="450" y="640" width="300" height="80" class="box"/>
  <text x="510" y="675" class="text">LLM Explanation Layer</text>
  <text x="495" y="695" class="text">(Schema-Constrained)</text>

  <!-- Logging -->
  <rect x="450" y="750" width="300" height="50" class="box"/>
  <text x="525" y="780" class="text">Structured Logging</text>

  <!-- Arrows -->
  <line x1="600" y1="130" x2="600" y2="160" class="arrow"/>
  <line x1="600" y1="230" x2="600" y2="260" class="arrow"/>
  <line x1="600" y1="330" x2="270" y2="380" class="arrow"/>
  <line x1="600" y1="330" x2="600" y2="380" class="arrow"/>
  <line x1="600" y1="330" x2="930" y2="380" class="arrow"/>
  <line x1="600" y1="490" x2="600" y2="530" class="arrow"/>
  <line x1="600" y1="610" x2="600" y2="640" class="arrow"/>
  <line x1="600" y1="720" x2="600" y2="750" class="arrow"/>

</svg>