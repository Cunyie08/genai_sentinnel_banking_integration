name: Frontend Deploy

on:
  push:
    branches: [ master ]
    paths:
      - 'NF_sentinel/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          cd NF_sentinel
          npm install
          npm run build

      - name: Zip Dist Contents
        # We go into the folder so the zip doesn't contain a nested 'dist' directory
        run: |
          cd NF_sentinel/dist
          zip -r ../../dist.zip .

      - name: Copy Zip to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist.zip"
          target: "/home/ubuntu/"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Prepare directory
            sudo mkdir -p /var/www/sentinnel-banking-api/NF_sentinel/dist
            sudo chown ubuntu:ubuntu /var/www/sentinnel-banking-api/NF_sentinel/dist
            
            # 2. Clean old files and unzip new ones
            rm -rf /var/www/sentinnel-banking-api/NF_sentinel/dist/*
            unzip -o /home/ubuntu/dist.zip -d /var/www/sentinnel-banking-api/NF_sentinel/dist/
            
            # 3. Set permissions for Nginx and cleanup
            sudo chown -R www-data:www-data /var/www/sentinnel-banking-api/NF_sentinel/dist
            rm /home/ubuntu/dist.zip
            
            sudo systemctl restart nginx
            echo "✅ Frontend updated successfully!"
