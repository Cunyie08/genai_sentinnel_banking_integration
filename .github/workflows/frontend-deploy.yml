name: Frontend Deploy

on:
  push:
    branches: [ master ]
    paths:
      - 'NF_sentinel/**'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          cd NF_sentinel
          npm install
          npm run build

      - name: Zip Dist Contents
        run: |
          cd NF_sentinel/dist
          zip -r ../../dist.zip .

      - name: Copy Zip to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist.zip"
          target: "/home/ubuntu/"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Unzip if missing
            sudo apt-get update && sudo apt-get install -y unzip

            # 2. Define target path
            TARGET_DIR="/var/www/sentinnel-banking-api/NF_sentinel/dist"

            # 3. FIX PERMISSIONS FIRST
            # We take back ownership so the 'rm' command below actually works
            sudo mkdir -p $TARGET_DIR
            sudo chown -R ubuntu:ubuntu $TARGET_DIR

            # 4. NUCLEAR CLEAN
            # Remove all old assets to prevent "ghosting" of old theme files
            rm -rf $TARGET_DIR/*

            # 5. DEPLOY NEW FILES
            if [ -f /home/ubuntu/dist.zip ]; then
                unzip -o /home/ubuntu/dist.zip -d $TARGET_DIR/
                echo "✅ Unzip successful"
            else
                echo "❌ Error: dist.zip not found!"
                exit 1
            fi

            # 6. FINAL PERMISSIONS (The "Golden Ratio")
            # User (ubuntu) has Full access to deploy next time
            # Group (www-data) has Read access so Nginx can show the site
            sudo chown -R ubuntu:www-data $TARGET_DIR
            sudo chmod -R 775 $TARGET_DIR

            # 7. CLEANUP & RELOAD
            rm /home/ubuntu/dist.zip
            sudo systemctl restart nginx
            echo "🚀 Deployment Complete: Sentinnel Red Theme is live!"
