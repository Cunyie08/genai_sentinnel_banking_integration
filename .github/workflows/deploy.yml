name: Deploy Sentinel API to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Copy files to EC2 server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/var/www/sentinnel-banking-api"

      - name: Execute setup and restart commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/sentinnel-banking-api
            
            # 1. Recreate .env in the folder where your code looks for it
            mkdir -p app/utils
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > app/utils/.env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> app/utils/.env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> app/utils/.env
            echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> app/utils/.env
            
            # 2. Update Virtual Environment
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # 3. Restart and Verify
            sudo systemctl daemon-reload
            sudo systemctl restart sentinnel-api
            
            sleep 3
            if ! sudo systemctl is-active --quiet sentinnel-api; then
              echo "❌ Backend failed to start. Logs:"
              sudo journalctl -u sentinnel-api -n 20 --no-pager
              exit 1
            fi
            echo "✅ Backend is live!"
